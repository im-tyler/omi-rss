api_server:
  port: 8080
  host: localhost
  cors:
    allowed_origins: 
      - http://localhost:3000
      - http://localhost:8080
      - chrome-extension://*
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - Content-Type
      - Authorization

web_server:
  port: 8081
  host: localhost

database:
  host: localhost
  port: 5432
  name: omi_rss_dev
  username: postgres
  password: postgres
  ssl: false
  max_connections: 10

auth:
  jwt_secret: dev-secret-key-change-in-production
  jwt_expiration_hours: 24
  refresh_token_days: 30
  send_validation_email: false
  validation_code_length: 6
  bcrypt_rounds: 10

email:
  provider: smtp
  smtp:
    host: smtp.gmail.com
    port: 587
    username: ""
    password: ""
    secure: true
  from: noreply@omi-rss.com

ai:
  providers:
    openai:
      api_key: ""
      model: gpt-3.5-turbo
      max_tokens: 1000
    anthropic:
      api_key: ""
      model: claude-3-haiku-20240307
      max_tokens: 1000
  default_provider: openai

rate_limit:
  window_ms: 60000
  max_requests: 100
  skip_successful: false
  key_generator: ip

cache:
  provider: memory
  redis:
    host: localhost
    port: 6379
    password: ""
    db: 0
  ttl_minutes: 60

storage:
  provider: local
  local:
    base_path: ./storage
  s3:
    bucket: ""
    region: us-east-1
    access_key: ""
    secret_key: ""