# Serverpod development configuration
apiServer:
  port: 8080
  publicHost: localhost
  publicPort: 8080
  publicScheme: http

webServer:
  port: 8081
  publicHost: localhost
  publicPort: 8081
  publicScheme: http

database:
  host: localhost
  port: 5432
  name: omi_rss_dev
  user: postgres
  password: password

redis:
  enabled: true
  host: localhost
  port: 6379

auth:
  sendValidationEmail: false
  validationCodeLength: 6
  jwtSecret: 'your-super-secret-jwt-key-change-in-production'
  accessTokenLifetime: 3600 # 1 hour
  refreshTokenLifetime: 2592000 # 30 days

email:
  enabled: false
  smtp:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    secure: true

ai:
  providers:
    openai:
      apiKey: ${OPENAI_API_KEY}
      model: gpt-4-turbo-preview
    anthropic:
      apiKey: ${ANTHROPIC_API_KEY}
      model: claude-3-opus-20240229
    google:
      apiKey: ${GOOGLE_AI_API_KEY}
      model: gemini-pro

monitoring:
  sentry:
    enabled: false
    dsn: ${SENTRY_DSN}
  
logging:
  level: debug
  console: true
  file: logs/development.log

rateLimit:
  enabled: true
  windowMs: 60000 # 1 minute
  maxRequests: 100

cors:
  enabled: true
  origins:
    - http://localhost:3000
    - http://localhost:8081
  credentials: true

features:
  aiAnalysis: true
  marketData: true
  collaboration: true
  feedGeneration: true
  paywallBypass: false # Disabled in dev for safety