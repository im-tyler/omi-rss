name: omi_rss_server
description: Serverpod backend for Omi RSS Reader
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  serverpod: ^2.0.0
  serverpod_auth_server: ^2.0.0
  serverpod_serialization: ^2.0.0
  
  # Database
  postgres: ^3.0.0
  redis: ^4.0.0
  
  # HTTP & WebSocket
  dio: ^5.3.4
  web_socket_channel: ^2.4.0
  
  # Authentication
  dart_jsonwebtoken: ^2.12.1
  bcrypt: ^1.1.3
  
  # Email
  mailer: ^6.0.1
  
  # Utilities
  uuid: ^4.2.1
  cron: ^0.6.0
  collection: ^1.18.0
  crypto: ^3.0.3
  
  # Monitoring
  logging: ^1.2.0
  sentry: ^7.14.0
  
  # Feed parsing
  webfeed_revised: ^0.7.2
  html: ^0.15.4
  http: ^1.1.0
  
  # AI providers
  dart_openai: ^5.1.0
  google_generative_ai: ^0.2.2

dev_dependencies:
  serverpod_cli: ^2.0.0
  lints: ^3.0.0
  test: ^1.24.0
  serverpod_test: ^2.0.0