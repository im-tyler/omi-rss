<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omi RSS Reader - Side Panel</title>
  <link rel="stylesheet" href="css/glassmorphism.css">
  <link rel="stylesheet" href="css/sidepanel.css">
</head>
<body>
  <div class="glass-bg"></div>
  <div class="particles"></div>
  
  <div id="app">
    <!-- Glassmorphism Header -->
    <header class="glass-header">
      <div class="header-main">
        <div class="logo-container">
          <img src="icons/icon-48.png" alt="Omi RSS" class="logo">
          <h1>Omi RSS Reader</h1>
        </div>
        <div class="header-actions">
          <button id="refresh-btn" class="glass-btn icon-btn" title="Refresh">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
          <button id="settings-btn" class="glass-btn icon-btn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/>
            </svg>
          </button>
        </div>
      </div>
      
      <!-- Search bar -->
      <div class="search-wrapper">
        <div class="search-container">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search" placeholder="Search articles..." class="search-input">
        </div>
      </div>
    </header>

    <!-- Main content -->
    <div class="main-content">
      <!-- Glass Sidebar -->
      <nav class="glass-sidebar">
        <div class="nav-section">
          <h3>Reading</h3>
          <div class="nav-group">
            <a href="#" class="glass-nav-item active" data-view="all">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M4 12.5A2.5 2.5 0 0 1 6.5 10H20"/>
                <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20"/>
              </svg>
              <span>All Articles</span>
              <span class="count" id="all-count">0</span>
            </a>
            <a href="#" class="glass-nav-item" data-view="unread">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
              </svg>
              <span>Unread</span>
              <span class="count" id="unread-count">0</span>
            </a>
            <a href="#" class="glass-nav-item" data-view="saved">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
              </svg>
              <span>Saved</span>
              <span class="count" id="saved-count">0</span>
            </a>
          </div>
        </div>
        
        <div class="nav-section">
          <h3>Feeds</h3>
          <div id="feeds-list" class="feeds-nav">
            <!-- Feeds will be dynamically inserted here -->
          </div>
          <a href="#" class="glass-nav-item add-feed" id="add-feed-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>Add Feed</span>
          </a>
        </div>
        
        <div class="nav-section">
          <h3>Tools</h3>
          <div class="nav-group">
            <a href="#" class="glass-nav-item" id="save-page-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>Save Current Page</span>
            </a>
            <a href="#" class="glass-nav-item" id="detect-feeds-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
              <span>Find Feeds</span>
            </a>
          </div>
        </div>
      </nav>

      <!-- Glass Article List -->
      <div class="glass-article-list" id="article-list">
        <div class="loading-state" id="loading">
          <div class="spinner"></div>
          <p>Loading articles...</p>
        </div>
        
        <div class="empty-state" id="empty" style="display: none;">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <h3>No articles found</h3>
          <p>Start by adding RSS feeds to see articles here</p>
        </div>
        
        <div id="articles-container" class="articles-container">
          <!-- Articles will be dynamically inserted here -->
        </div>
      </div>

      <!-- Glass Article Reader -->
      <div class="glass-reader" id="article-reader" style="display: none;">
        <div class="glass-reader-header">
          <button id="close-reader" class="glass-btn icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="reader-actions">
            <button id="toggle-read" class="glass-btn icon-btn" title="Mark as read/unread">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"/>
                <path d="m9 12 2 2 4-4"/>
              </svg>
            </button>
            <button id="save-article" class="glass-btn icon-btn" title="Save article">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <button id="open-external" class="glass-btn icon-btn" title="Open in browser">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="glass-reader-content" id="reader-content">
          <!-- Article content will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage-service.js"></script>
  <script src="js/feed-parser.js"></script>
  <script src="js/sidepanel-local.js"></script>
</body>
</html>
