<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omi RSS Reader</title>
  <link rel="stylesheet" href="css/reader.css">
</head>
<body>
  <div id="reader-app">
    <!-- Full reader interface for Brave persistent tab mode -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-section">
          <img src="icons/icon-48.png" alt="Omi RSS" class="logo">
          <h1>Omi RSS</h1>
          <span class="brave-indicator" id="brave-indicator" style="display: none;">Brave</span>
        </div>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1M20.5 7.5L16 12l4.5 4.5M3.5 7.5L8 12l-4.5 4.5"/>
          </svg>
        </button>
      </div>
      
      <nav class="main-nav">
        <button class="nav-item active" data-view="feeds">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M4 11a9 9 0 0 1 9 9M4 4a16 16 0 0 1 16 16"/>
            <circle cx="5" cy="19" r="1"/>
          </svg>
          <span>All Feeds</span>
          <span class="count">24</span>
        </button>
        <button class="nav-item" data-view="unread">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Unread</span>
          <span class="count">12</span>
        </button>
        <button class="nav-item" data-view="saved">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Saved</span>
        </button>
        <button class="nav-item" data-view="folders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Folders</span>
        </button>
      </nav>
      
      <div class="feed-list" id="feed-list">
        <h3 class="section-title">Subscriptions</h3>
        <!-- Feed items will be populated here -->
      </div>
      
      <div class="sidebar-footer">
        <button class="add-feed-btn" id="add-feed-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>Add Feed</span>
        </button>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="content-header">
        <div class="header-left">
          <h2 id="current-view-title">All Articles</h2>
          <span class="article-count" id="article-count">142 articles</span>
        </div>
        <div class="header-right">
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" placeholder="Search articles..." id="search-input">
          </div>
          <button class="icon-btn" id="refresh-btn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
          </button>
          <button class="icon-btn" id="view-mode-btn" title="Change view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
        </div>
      </header>
      
      <div class="article-list" id="article-list">
        <!-- Articles will be populated here -->
      </div>
      
      <div class="reading-pane" id="reading-pane" style="display: none;">
        <header class="article-header">
          <button class="icon-btn back-btn" id="back-to-list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="article-actions">
            <button class="icon-btn" id="save-article" title="Save article">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
            <button class="icon-btn" id="share-article" title="Share">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="18" cy="5" r="3"/>
                <circle cx="6" cy="12" r="3"/>
                <circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
            </button>
            <button class="icon-btn" id="open-original" title="Open original">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </button>
          </div>
        </header>
        <article class="article-content" id="article-content">
          <!-- Article content will be displayed here -->
        </article>
      </div>
    </main>
  </div>
  
  <script src="js/reader.js"></script>
</body>
</html>
