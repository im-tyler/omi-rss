<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Glassmorphism Icons</title>
</head>
<body>
  <h1>Glassmorphism Icon Generator</h1>
  <p>Right-click each icon and save as the specified filename in the icons folder</p>
  
  <div style="display: flex; gap: 20px; flex-wrap: wrap; background: #1a1a1a; padding: 20px;">
    <div>
      <canvas id="icon-16" width="16" height="16"></canvas>
      <p style="color: white;">icon-16.png</p>
    </div>
    <div>
      <canvas id="icon-32" width="32" height="32"></canvas>
      <p style="color: white;">icon-32.png</p>
    </div>
    <div>
      <canvas id="icon-48" width="48" height="48"></canvas>
      <p style="color: white;">icon-48.png</p>
    </div>
    <div>
      <canvas id="icon-128" width="128" height="128"></canvas>
      <p style="color: white;">icon-128.png</p>
    </div>
  </div>

  <script>
    function drawGlassmorphismIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      
      // Create gradient background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#FF6B6B');
      gradient.addColorStop(1, '#FFE66D');
      
      // Draw rounded rectangle background
      const radius = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      
      // Fill with gradient
      ctx.fillStyle = gradient;
      ctx.fill();
      
      // Add glass effect overlay
      ctx.globalAlpha = 0.3;
      const glassGradient = ctx.createLinearGradient(0, 0, size, size * 0.5);
      glassGradient.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
      glassGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
      ctx.fillStyle = glassGradient;
      ctx.fill();
      ctx.globalAlpha = 1;
      
      // Draw RSS icon
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size * 0.06;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      const center = size / 2;
      const scale = size / 48; // Base size is 48
      
      // Draw RSS waves
      ctx.beginPath();
      ctx.arc(center - 10 * scale, center + 10 * scale, 3 * scale, 0, Math.PI * 2);
      ctx.fillStyle = 'white';
      ctx.fill();
      
      // First wave
      ctx.beginPath();
      ctx.arc(center - 10 * scale, center + 10 * scale, 8 * scale, -Math.PI * 0.7, -Math.PI * 0.1, false);
      ctx.stroke();
      
      // Second wave
      ctx.beginPath();
      ctx.arc(center - 10 * scale, center + 10 * scale, 14 * scale, -Math.PI * 0.7, -Math.PI * 0.1, false);
      ctx.stroke();
      
      // Third wave
      ctx.beginPath();
      ctx.arc(center - 10 * scale, center + 10 * scale, 20 * scale, -Math.PI * 0.7, -Math.PI * 0.1, false);
      ctx.stroke();
      
      // Add subtle shadow
      ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
      ctx.shadowBlur = size * 0.1;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = size * 0.05;
      
      // Redraw the shape with shadow
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
    }
    
    // Generate all icon sizes
    drawGlassmorphismIcon('icon-16', 16);
    drawGlassmorphismIcon('icon-32', 32);
    drawGlassmorphismIcon('icon-48', 48);
    drawGlassmorphismIcon('icon-128', 128);
    
    // Auto-download function
    function downloadCanvas(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL();
      link.click();
    }
    
    // Add download buttons
    const canvases = document.querySelectorAll('canvas');
    canvases.forEach(canvas => {
      const container = canvas.parentElement;
      const button = document.createElement('button');
      button.textContent = 'Download';
      button.style.marginTop = '10px';
      button.onclick = () => downloadCanvas(canvas.id, canvas.id + '.png');
      container.appendChild(button);
    });
  </script>
</body>
</html>
