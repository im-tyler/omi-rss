<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omi RSS - Debug</title>
    <style>
        body {
            width: 380px;
            min-height: 500px;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #ff6b00;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .debug-info {
            background: #242424;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .debug-info h3 {
            margin-top: 0;
            color: #ff6b00;
            font-size: 16px;
        }
        .status {
            padding: 8px 12px;
            border-radius: 4px;
            margin: 5px 0;
            font-size: 14px;
        }
        .success { background: #4caf50; }
        .error { background: #f44336; }
        .warning { background: #ff9800; }
        code {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }
        button {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #e55a00;
        }
    </style>
</head>
<body>
    <h1>Omi RSS Debug</h1>
    
    <div class="debug-info">
        <h3>CSS Loading Test</h3>
        <div id="css-status" class="status">Checking CSS...</div>
    </div>

    <div class="debug-info">
        <h3>JavaScript Loading Test</h3>
        <div id="js-status" class="status">Checking JS...</div>
    </div>

    <div class="debug-info">
        <h3>Chrome API Test</h3>
        <div id="api-status" class="status">Checking API...</div>
    </div>

    <div class="debug-info">
        <h3>Storage Test</h3>
        <button id="test-storage-btn">Test Storage</button>
        <div id="storage-status" class="status">Ready to test</div>
    </div>

    <div class="debug-info">
        <h3>Actions</h3>
        <button id="open-popup-btn">Open Main Popup</button>
        <button id="check-console-btn">View Console</button>
    </div>

    <script>
        // Check CSS loading
        const cssStatus = document.getElementById('css-status');
        const styleSheets = document.styleSheets;
        if (styleSheets.length > 0) {
            cssStatus.className = 'status success';
            cssStatus.textContent = `✓ ${styleSheets.length} stylesheet(s) loaded`;
        } else {
            cssStatus.className = 'status warning';
            cssStatus.textContent = '⚠ No external stylesheets detected';
        }

        // Check JS context
        const jsStatus = document.getElementById('js-status');
        jsStatus.className = 'status success';
        jsStatus.textContent = '✓ JavaScript is running';

        // Check Chrome API
        const apiStatus = document.getElementById('api-status');
        if (typeof chrome !== 'undefined' && chrome.runtime) {
            apiStatus.className = 'status success';
            apiStatus.textContent = '✓ Chrome API available';
            
            // Get manifest info
            const manifest = chrome.runtime.getManifest();
            apiStatus.innerHTML += `<br>Version: ${manifest.version}`;
        } else {
            apiStatus.className = 'status error';
            apiStatus.textContent = '✗ Chrome API not available';
        }

        // Test storage
        async function testStorage() {
            const storageStatus = document.getElementById('storage-status');
            try {
                await chrome.storage.local.set({ test: 'value' });
                const result = await chrome.storage.local.get('test');
                if (result.test === 'value') {
                    storageStatus.className = 'status success';
                    storageStatus.textContent = '✓ Storage working correctly';
                } else {
                    throw new Error('Storage value mismatch');
                }
            } catch (error) {
                storageStatus.className = 'status error';
                storageStatus.textContent = `✗ Storage error: ${error.message}`;
            }
        }

        // Open main popup
        function openMainPopup() {
            window.location.href = 'popup.html';
        }

        // Check console
        function checkConsole() {
            console.log('=== Omi RSS Extension Debug Info ===');
            console.log('Manifest:', chrome.runtime.getManifest());
            console.log('Extension ID:', chrome.runtime.id);
            console.log('Document ready state:', document.readyState);
            console.log('Stylesheets:', document.styleSheets);
            alert('Check the console (right-click → Inspect popup → Console tab)');
        }

        // Check for common issues
        window.addEventListener('error', (event) => {
            console.error('Global error:', event.error);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'status error';
            errorDiv.textContent = `Error: ${event.error.message}`;
            document.body.appendChild(errorDiv);
        });

        // Log when fully loaded
        window.addEventListener('load', () => {
            console.log('Popup fully loaded');
        });

        // Add event listeners (must be done this way due to CSP)
        document.getElementById('test-storage-btn').addEventListener('click', testStorage);
        document.getElementById('open-popup-btn').addEventListener('click', openMainPopup);
        document.getElementById('check-console-btn').addEventListener('click', checkConsole);
    </script>
</body>
</html>
