<!DOCTYPE html>
<html>
<head>
    <title>Generate Extension Icons</title>
</head>
<body>
    <h1>Icon Generator</h1>
    <p>Right-click each icon and save it with the correct filename in the icons folder:</p>
    
    <div style="display: flex; gap: 20px; align-items: center;">
        <div>
            <h3>icon-16.png</h3>
            <canvas id="icon16" width="16" height="16"></canvas>
        </div>
        <div>
            <h3>icon-32.png</h3>
            <canvas id="icon32" width="32" height="32"></canvas>
        </div>
        <div>
            <h3>icon-48.png</h3>
            <canvas id="icon48" width="48" height="48"></canvas>
        </div>
        <div>
            <h3>icon-128.png</h3>
            <canvas id="icon128" width="128" height="128"></canvas>
        </div>
    </div>

    <script>
        // Create a simple RSS icon
        function drawIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#2196F3';
            ctx.fillRect(0, 0, size, size);
            
            // RSS symbol
            ctx.fillStyle = '#FFFFFF';
            const scale = size / 128;
            
            // Draw RSS waves
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 10 * scale, 0, 2 * Math.PI);
            ctx.fill();
            
            // First arc
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 30 * scale, -Math.PI/2, 0);
            ctx.lineWidth = 10 * scale;
            ctx.strokeStyle = '#FFFFFF';
            ctx.stroke();
            
            // Second arc
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 50 * scale, -Math.PI/2, 0);
            ctx.lineWidth = 10 * scale;
            ctx.stroke();
            
            // Third arc
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 70 * scale, -Math.PI/2, 0);
            ctx.lineWidth = 10 * scale;
            ctx.stroke();
        }
        
        // Generate all icon sizes
        drawIcon('icon16', 16);
        drawIcon('icon32', 32);
        drawIcon('icon48', 48);
        drawIcon('icon128', 128);
        
        // Auto-download function
        function downloadCanvas(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Add download buttons
        setTimeout(() => {
            const container = document.body;
            const downloadBtn = document.createElement('button');
            downloadBtn.textContent = 'Download All Icons';
            downloadBtn.style.marginTop = '20px';
            downloadBtn.style.padding = '10px';
            downloadBtn.onclick = () => {
                downloadCanvas('icon16', 'icon-16.png');
                setTimeout(() => downloadCanvas('icon32', 'icon-32.png'), 500);
                setTimeout(() => downloadCanvas('icon48', 'icon-48.png'), 1000);
                setTimeout(() => downloadCanvas('icon128', 'icon-128.png'), 1500);
            };
            container.appendChild(downloadBtn);
        }, 100);
    </script>
</body>
</html>
