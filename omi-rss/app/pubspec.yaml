name: rss_glassmorphism_reader
description: A glassmorphism RSS reader with AI capabilities
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Networking
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0
  web_socket_channel: ^2.4.0
  mqtt_client: ^10.0.0
  
  # Parsing
  xml: ^6.5.0
  html: ^0.15.4
  http_parser: ^4.0.2
  webfeed: ^0.7.0
  
  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.66.0
  flutter_tts: ^3.8.5
  
  # Utilities
  uuid: ^4.2.1
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  logger: ^2.0.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Platform
  flutter_local_notifications: ^16.2.0
  workmanager: ^0.5.2
  nearby_connections: ^4.0.1
  file_picker: ^6.1.1
  flutter_webrtc: ^0.9.47
  permission_handler: ^11.1.0
  
  # AI & ML
  tflite_flutter: ^0.10.4
  ml_algo: ^16.17.7
  ml_dataframe: ^1.5.0
  fl_chart: ^0.65.0
  
  # Web Support
  js: ^0.6.7
  web: ^0.4.0
  universal_html: ^2.2.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/models/
    - assets/rules/sites/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf