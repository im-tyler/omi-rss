name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Get version
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: RSS Glassmorphism Reader ${{ steps.get_version.outputs.version }}
        body: |
          ## RSS Glassmorphism Reader ${{ steps.get_version.outputs.version }}
          
          ### Features
          - Beautiful glassmorphism UI design
          - AI-powered article analysis
          - Advanced paywall bypass
          - P2P sync between devices
          - Browser extension
          - Portfolio tracking
          - Real-time alerts
          
          ### Downloads
          See assets below for platform-specific builds.
        draft: false
        prerelease: false

  deploy-android:
    name: Deploy Android
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Build App Bundle
      run: flutter build appbundle --release
    
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      with:
        releaseDirectory: build/app/outputs/flutter-apk
        signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
    
    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: build/app/outputs/flutter-apk/app-release-signed.apk
        asset_name: rss-reader-${{ needs.create-release.outputs.version }}.apk
        asset_content_type: application/vnd.android.package-archive
    
    - name: Upload to Play Store
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT }}
        packageName: com.example.rss_glassmorphism_reader
        releaseFiles: build/app/outputs/bundle/release/app-release.aab
        track: production

  deploy-ios:
    name: Deploy iOS
    needs: create-release
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build iOS
      run: flutter build ios --release
    
    - name: Archive iOS app
      run: |
        cd ios
        xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -archivePath build/Runner.xcarchive archive
    
    - name: Export IPA
      run: |
        cd ios
        xcodebuild -exportArchive -archivePath build/Runner.xcarchive -exportPath build -exportOptionsPlist ExportOptions.plist
    
    - name: Upload IPA to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ios/build/RSS Reader.ipa
        asset_name: rss-reader-${{ needs.create-release.outputs.version }}.ipa
        asset_content_type: application/octet-stream
    
    - name: Upload to App Store
      env:
        APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_API_KEY_ID }}
        APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_API_KEY_ISSUER_ID }}
        APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_API_KEY }}
      run: |
        xcrun altool --upload-app -f "ios/build/RSS Reader.ipa" -t ios --apiKey $APP_STORE_CONNECT_API_KEY_ID --apiIssuer $APP_STORE_CONNECT_API_KEY_ISSUER_ID

  deploy-web:
    name: Deploy Web
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build web
      run: flutter build web --release --web-renderer html
    
    - name: Deploy to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
        channelId: live
        projectId: rss-glassmorphism-reader
    
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
        working-directory: build/web

  deploy-desktop:
    name: Deploy Desktop
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            extension: tar.gz
          - os: windows-latest
            platform: windows
            extension: zip
          - os: macos-latest
            platform: macos
            extension: dmg
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Enable desktop support
      run: |
        flutter config --enable-linux-desktop
        flutter config --enable-windows-desktop
        flutter config --enable-macos-desktop
    
    - name: Build desktop
      run: flutter build ${{ matrix.platform }} --release
    
    - name: Package Linux
      if: matrix.platform == 'linux'
      run: |
        cd build/linux/x64/release
        tar -czf rss-reader-linux.tar.gz bundle
    
    - name: Package Windows
      if: matrix.platform == 'windows'
      run: |
        cd build/windows/x64/runner
        Compress-Archive -Path Release -DestinationPath rss-reader-windows.zip
    
    - name: Package macOS
      if: matrix.platform == 'macos'
      run: |
        cd build/macos/Build/Products/Release
        hdiutil create -volname "RSS Reader" -srcfolder "RSS Reader.app" -ov -format UDZO rss-reader-macos.dmg
    
    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: build/${{ matrix.platform }}/*/rss-reader-${{ matrix.platform }}.${{ matrix.extension }}
        asset_name: rss-reader-${{ needs.create-release.outputs.version }}-${{ matrix.platform }}.${{ matrix.extension }}
        asset_content_type: application/octet-stream

  deploy-extension:
    name: Deploy Chrome Extension
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build extension
      run: |
        cd web/extension
        chmod +x build_extension.sh
        ./build_extension.sh
    
    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: build/rss_reader_extension.zip
        asset_name: rss-reader-extension-${{ needs.create-release.outputs.version }}.zip
        asset_content_type: application/zip
    
    - name: Publish to Chrome Web Store
      uses: trmcnvn/chrome-addon@v2
      with:
        extension: build/rss_reader_extension.zip
        publish: true
        client-id: ${{ secrets.CHROME_CLIENT_ID }}
        client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
        refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}