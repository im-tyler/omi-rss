<!DOCTYPE html>
<html>
<head>
    <title>Icon Generator</title>
</head>
<body>
    <h1>RSS Reader Icon Generator</h1>
    <p>Right-click each canvas and save as the corresponding filename:</p>
    
    <div>
        <h3>icon-16.png</h3>
        <canvas id="icon16" width="16" height="16"></canvas>
    </div>
    
    <div>
        <h3>icon-32.png</h3>
        <canvas id="icon32" width="32" height="32"></canvas>
    </div>
    
    <div>
        <h3>icon-48.png</h3>
        <canvas id="icon48" width="48" height="48"></canvas>
    </div>
    
    <div>
        <h3>icon-128.png</h3>
        <canvas id="icon128" width="128" height="128"></canvas>
    </div>

    <script>
        function drawIcon(canvasId, size) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Gradient background
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // RSS icon
            ctx.fillStyle = 'white';
            ctx.globalAlpha = 0.9;
            
            // Scale factors
            const scale = size / 128;
            
            // Draw RSS symbol
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 10 * scale, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 25 * scale, 1.5 * Math.PI, 2 * Math.PI);
            ctx.lineWidth = 10 * scale;
            ctx.strokeStyle = 'white';
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(20 * scale, 108 * scale, 45 * scale, 1.5 * Math.PI, 2 * Math.PI);
            ctx.stroke();
            
            // Add glass effect
            ctx.globalAlpha = 0.2;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, size, size / 2);
        }
        
        drawIcon('icon16', 16);
        drawIcon('icon32', 32);
        drawIcon('icon48', 48);
        drawIcon('icon128', 128);
    </script>
</body>
</html>
