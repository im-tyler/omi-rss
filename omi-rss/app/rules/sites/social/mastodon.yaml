# Mastodon feed generation rules
site: mastodon.social
name: Mastodon
patterns:
  - pattern: "/@{username}"
    example: "/@Gargron"
  - pattern: "/tags/{hashtag}"
    example: "/tags/fediverse"
  - pattern: "/public/local"
    example: "/public/local"

selectors:
  feed_title:
    css: 'h1 span'
    attr: text
  feed_description:
    css: 'div.account__header__bio'
    attr: text
  items: 'article.status'
  item_title:
    css: 'div.status__content'
    attr: text
    regex: '^(.{0,80})'
  item_link:
    css: 'a.status__relative-time'
    attr: href
  item_content:
    css: 'div.status__content'
    attr: html
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span.display-name__name'
    attr: text
  item_image:
    css: 'img.media-gallery__item-thumbnail'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://mastodon.social'
  - action: expand_content_warnings
  - action: clean_mentions

javascript_required: false
rate_limit: 300