# LinkedIn feed generation rules
site: linkedin.com
name: LinkedIn
patterns:
  - pattern: "/in/{username}"
    example: "/in/billgates"
  - pattern: "/company/{company}"
    example: "/company/microsoft"
  - pattern: "/posts/{username}"
    example: "/posts/satyanadella"
  - pattern: "/pulse/{topic}"
    example: "/pulse/technology"

selectors:
  feed_title:
    css: 'h1.top-card__title'
    attr: text
  feed_description:
    css: 'p.top-card__subline'
    attr: text
  items: 'div.feed-shared-update-v2'
  item_title:
    css: 'span.feed-shared-text__text-view'
    attr: text
    regex: '^(.{0,100})'
  item_link:
    css: 'a.feed-shared-control-menu__trigger'
    attr: href
  item_content:
    css: 'div.feed-shared-update-v2__description'
    attr: html
  item_date:
    css: 'time.feed-shared-actor__sub-description'
    attr: text
  item_author:
    css: 'span.feed-shared-actor__name'
    attr: text
  item_image:
    css: 'img.feed-shared-image__image'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://linkedin.com'
  - action: extract_article_link
    selector: 'a.feed-shared-article__link'
  - action: clean_tracking

javascript_required: true
rate_limit: 2000
custom_headers:
  Accept-Language: 'en-US,en;q=0.9'