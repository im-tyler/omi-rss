# Twitter/X feed generation rules
site: twitter.com
name: Twitter/X
patterns:
  - pattern: "/{username}"
    example: "/elonmusk"
  - pattern: "/search?q={query}"
    example: "/search?q=flutter"
  - pattern: "/{username}/lists/{list}"
    example: "/jack/lists/tech"
  - pattern: "/hashtag/{tag}"
    example: "/hashtag/programming"

selectors:
  feed_title:
    css: 'h2[role="heading"]'
    attr: text
  feed_description:
    css: 'div[data-testid="UserDescription"]'
    attr: text
  items: 'article[role="article"]'
  item_title:
    css: 'div[lang]'
    attr: text
  item_link:
    css: 'a[href*="/status/"]'
    attr: href
  item_content:
    css: 'div[lang]'
    attr: html
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span[data-testid="User-Name"]'
    attr: text
  item_image:
    css: 'img[alt="Image"]'
    attr: src

transforms:
  - action: remove
    selector: 'span.promotional'
  - action: absolute_urls
    base: 'https://twitter.com'
  - action: clean_tracking
  - action: expand_urls

javascript_required: true
rate_limit: 1000
user_agent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
custom_headers:
  Referer: 'https://twitter.com'