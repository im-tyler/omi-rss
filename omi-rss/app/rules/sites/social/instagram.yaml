# Instagram feed generation rules
site: instagram.com
name: Instagram
patterns:
  - pattern: "/{username}"
    example: "/cristiano"
  - pattern: "/explore/tags/{hashtag}"
    example: "/explore/tags/nature"
  - pattern: "/stories/{username}"
    example: "/stories/nike"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'span[dir="auto"]'
    attr: text
    index: 0
  items: 'article'
  item_title:
    css: 'img'
    attr: alt
  item_link:
    css: 'a[href*="/p/"]'
    attr: href
  item_content:
    css: 'img'
    attr: src
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span.x1lliihq'
    attr: text
  item_image:
    css: 'img.x5yr21d'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://instagram.com'
  - action: clean_tracking
  - action: extract_caption
    selector: 'span._aade'

javascript_required: true
rate_limit: 2000
encoding: utf-8