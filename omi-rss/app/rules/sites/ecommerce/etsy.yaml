# Etsy feed generation rules
site: etsy.com
name: Etsy
patterns:
  - pattern: "/search?q={query}"
    example: "/search?q=handmade+jewelry"
  - pattern: "/shop/{shopname}"
    example: "/shop/VintageFindsStore"
  - pattern: "/c/{category}"
    example: "/c/art-and-collectibles"
  - pattern: "/featured/{collection}"
    example: "/featured/wedding-gifts"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'div.shop-announcement'
    attr: text
  items: 'li.wt-list-unstyled'
  item_title:
    css: 'h3.wt-text-caption'
    attr: text
  item_link:
    css: 'a.listing-link'
    attr: href
  item_content:
    css: 'p.wt-text-caption'
    attr: text
  item_date:
    css: 'span.wt-text-caption'
    attr: text
  item_author:
    css: 'p.wt-text-gray'
    attr: text
  item_image:
    css: 'img.wt-width-full'
    attr: src
  item_categories:
    css: 'span.wt-text-caption-title'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.etsy.com'
  - action: extract_price
    selector: 'p.wt-text-title-01'
  - action: extract_reviews
    selector: 'span.wt-text-caption'
  - action: clean_tracking

javascript_required: true
rate_limit: 1500