# eBay feed generation rules
site: ebay.com
name: eBay
patterns:
  - pattern: "/sch/i.html?_nkw={query}"
    example: "/sch/i.html?_nkw=vintage+camera"
  - pattern: "/sch/{category}"
    example: "/sch/collectibles"
  - pattern: "/usr/{username}"
    example: "/usr/techdeals"
  - pattern: "/b/{category}"
    example: "/b/Electronics/bn_7000259124"

selectors:
  feed_title:
    css: 'h1.b-pageheader__text'
    attr: text
  feed_description: 'eBay - Buy and sell electronics, cars, fashion, and more'
  items: 'li.s-item'
  item_title:
    css: 'h3.s-item__title'
    attr: text
  item_link:
    css: 'a.s-item__link'
    attr: href
  item_content:
    css: 'div.s-item__subtitle'
    attr: text
  item_date:
    css: 'span.s-item__endtime'
    attr: text
  item_author:
    css: 'span.s-item__seller-info-text'
    attr: text
  item_image:
    css: 'img.s-item__image-img'
    attr: src
  item_categories:
    css: 'span.s-item__category'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.ebay.com'
  - action: extract_price
    selector: 'span.s-item__price'
  - action: extract_bids
    selector: 'span.s-item__bids'
  - action: extract_shipping
    selector: 'span.s-item__shipping'

javascript_required: false
rate_limit: 1500