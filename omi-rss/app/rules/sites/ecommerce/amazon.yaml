# Amazon feed generation rules
site: amazon.com
name: Amazon
patterns:
  - pattern: "/s?k={query}"
    example: "/s?k=laptop"
  - pattern: "/gp/bestsellers/{category}"
    example: "/gp/bestsellers/books"
  - pattern: "/gp/new-releases/{category}"
    example: "/gp/new-releases/electronics"
  - pattern: "/dp/{asin}/ref=cm_cr_arp_d_product_top"
    example: "/dp/B08N5WRWNW/ref=cm_cr_arp_d_product_top"

selectors:
  feed_title:
    css: 'span.a-size-base-plus'
    attr: text
  feed_description: 'Amazon Product Updates'
  items: 'div[data-component-type="s-search-result"], div.zg-item-immersion'
  item_title:
    css: 'h2 span'
    attr: text
  item_link:
    css: 'h2 a'
    attr: href
  item_content:
    css: 'span.a-size-base'
    attr: text
  item_date:
    css: 'span.a-text-bold'
    attr: text
  item_author:
    css: 'span.s-size-mild'
    attr: text
  item_image:
    css: 'img.s-image'
    attr: src
  item_categories:
    css: 'span.a-size-base.a-color-secondary'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.amazon.com'
  - action: extract_price
    selector: 'span.a-price-whole'
  - action: extract_rating
    selector: 'span.a-icon-alt'
  - action: clean_tracking

javascript_required: false
rate_limit: 2000