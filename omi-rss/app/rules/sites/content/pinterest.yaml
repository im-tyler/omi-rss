# Pinterest feed generation rules
site: pinterest.com
name: Pinterest
patterns:
  - pattern: "/{username}"
    example: "/pinterest"
  - pattern: "/{username}/{board}"
    example: "/pinterest/official-news"
  - pattern: "/search/pins/?q={query}"
    example: "/search/pins/?q=home+decor"
  - pattern: "/today"
    example: "/today"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'div[data-test-id="profile-description"]'
    attr: text
  items: 'div[data-test-id="pin"]'
  item_title:
    css: 'h3'
    attr: text
  item_link:
    css: 'a[href*="/pin/"]'
    attr: href
  item_content:
    css: 'div[data-test-id="pin-description"]'
    attr: text
  item_date:
    css: 'div[data-test-id="pin-attribution"] span'
    attr: text
  item_author:
    css: 'div[data-test-id="pin-attribution"] a'
    attr: text
  item_image:
    css: 'img[data-test-id="pin-image"]'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://www.pinterest.com'
  - action: extract_board_info
  - action: clean_tracking

javascript_required: true
rate_limit: 2000