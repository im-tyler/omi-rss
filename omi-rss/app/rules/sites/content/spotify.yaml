# Spotify feed generation rules
site: open.spotify.com
name: Spotify
patterns:
  - pattern: "/show/{showId}"
    example: "/show/2MAi0BvDc6GTFvKFPXnkCL"
  - pattern: "/playlist/{playlistId}"
    example: "/playlist/37i9dQZF1DXcBWIGoYBM5M"
  - pattern: "/artist/{artistId}"
    example: "/artist/3WrFJ7ztbogyGnTHbHJFl2"
  - pattern: "/album/{albumId}"
    example: "/album/1DFixLWuPkv3KT3TnV35m3"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'div[data-testid="description"]'
    attr: text
  items: 'div[data-testid="tracklist-row"], div[data-testid="episode"]'
  item_title:
    css: 'div[data-testid="track-title"]'
    attr: text
  item_link:
    css: 'a[data-testid="track-title-link"]'
    attr: href
  item_content:
    css: 'div[data-testid="episode-description"]'
    attr: text
  item_date:
    css: 'span[data-testid="episode-date"]'
    attr: text
  item_author:
    css: 'a[data-testid="artist-link"]'
    attr: text
  item_image:
    css: 'img[data-testid="card-image"]'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://open.spotify.com'
  - action: extract_duration
    selector: 'div[data-testid="track-duration"]'
  - action: generate_embed_player

javascript_required: true
rate_limit: 2000
custom_headers:
  App-Platform: 'WebPlayer'