# YouTube feed generation rules
site: youtube.com
name: YouTube
patterns:
  - pattern: "/channel/{channelId}"
    example: "/channel/UCwXdFgeE9KYzlDdR7TG9cMw"
  - pattern: "/@{handle}"
    example: "/@mkbhd"
  - pattern: "/user/{username}"
    example: "/user/LinusTechTips"
  - pattern: "/playlist?list={playlistId}"
    example: "/playlist?list=PLrAXtmErZgOeiKm4sgNOknGvNjby9efdf"
  - pattern: "/results?search_query={query}"
    example: "/results?search_query=flutter+tutorial"

selectors:
  feed_title:
    css: 'yt-formatted-string.ytd-channel-name'
    attr: text
  feed_description:
    css: 'yt-formatted-string#description'
    attr: text
  items: 'ytd-grid-video-renderer, ytd-video-renderer'
  item_title:
    css: 'h3 a#video-title'
    attr: text
  item_link:
    css: 'a#video-title'
    attr: href
  item_content:
    css: 'yt-formatted-string#description-text'
    attr: text
  item_date:
    css: 'span.ytd-video-meta-block'
    attr: text
    regex: '(\d+ \w+ ago)'
  item_author:
    css: 'yt-formatted-string.ytd-channel-name a'
    attr: text
  item_image:
    css: 'img#img'
    attr: src

transforms:
  - action: absolute_urls
    base: 'https://www.youtube.com'
  - action: extract_video_id
    regex: '/watch\?v=([^&]+)'
  - action: generate_embed_code
  - action: extract_duration
    selector: 'span.ytd-thumbnail-overlay-time-status-renderer'

javascript_required: true
rate_limit: 2000
custom_headers:
  Accept-Language: 'en-US,en;q=0.9'