# Twitch feed generation rules
site: twitch.tv
name: Twitch
patterns:
  - pattern: "/{username}"
    example: "/shroud"
  - pattern: "/{username}/videos"
    example: "/shroud/videos"
  - pattern: "/{username}/clips"
    example: "/shroud/clips"
  - pattern: "/directory/game/{game}"
    example: "/directory/game/valorant"
  - pattern: "/directory/all/tags/{tag}"
    example: "/directory/all/tags/speedrun"

selectors:
  feed_title:
    css: 'h1[data-a-target="stream-title"]'
    attr: text
  feed_description:
    css: 'div[data-a-target="about-panel"] p'
    attr: text
  items: 'article[data-a-target="video-tower-card"], div.clip-card'
  item_title:
    css: 'h3[data-a-target="preview-card-title"]'
    attr: text
  item_link:
    css: 'a[data-a-target="preview-card-title-link"]'
    attr: href
  item_content:
    css: 'div.preview-card-description'
    attr: text
  item_date:
    css: 'div[data-a-target="stream-duration"]'
    attr: text
  item_author:
    css: 'p[data-a-target="preview-card-channel-link"]'
    attr: text
  item_image:
    css: 'img[data-a-target="preview-card-image"]'
    attr: src
  item_categories:
    css: 'a[data-a-target="preview-card-game-link"]'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.twitch.tv'
  - action: extract_view_count
    selector: 'span.tw-media-card-stat'
  - action: generate_clip_embed

javascript_required: true
rate_limit: 1500