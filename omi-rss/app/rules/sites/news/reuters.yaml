# Reuters feed generation rules
site: reuters.com
name: Reuters
patterns:
  - pattern: "/"
    example: "/"
  - pattern: "/world"
    example: "/world"
  - pattern: "/business"
    example: "/business"
  - pattern: "/technology"
    example: "/technology"
  - pattern: "/markets"
    example: "/markets"

selectors:
  feed_title:
    css: 'h1.text__heading'
    attr: text
  feed_description: 'Reuters - Business, Financial, and Breaking News'
  items: 'li.story-card'
  item_title:
    css: 'h3.story-card__heading'
    attr: text
  item_link:
    css: 'a.story-card__heading__link'
    attr: href
  item_content:
    css: 'p.story-card__description'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span.author-name'
    attr: text
  item_image:
    css: 'img.story-card__image'
    attr: src
  item_categories:
    css: 'span.story-card__label'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.reuters.com'
  - action: clean_tracking
  - action: extract_lead_text

javascript_required: false
rate_limit: 1000