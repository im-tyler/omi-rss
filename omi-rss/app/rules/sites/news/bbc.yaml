# BBC News feed generation rules
site: bbc.com
name: BBC News
patterns:
  - pattern: "/news"
    example: "/news"
  - pattern: "/news/{section}"
    example: "/news/technology"
  - pattern: "/news/world/{region}"
    example: "/news/world/europe"
  - pattern: "/sport/{sport}"
    example: "/sport/football"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description: 'BBC News - Breaking news, features and analysis'
  items: 'article[data-testid="card"]'
  item_title:
    css: 'h2'
    attr: text
  item_link:
    css: 'a[data-testid="internal-link"]'
    attr: href
  item_content:
    css: 'p[data-testid="card-description"]'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author: 'BBC News'
  item_image:
    css: 'img'
    attr: src
  item_categories:
    css: 'span[data-testid="card-metadata-tag"]'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.bbc.com'
  - action: clean_tracking
  - action: remove
    selector: '.bbc-18z6rph'

javascript_required: false
rate_limit: 1000