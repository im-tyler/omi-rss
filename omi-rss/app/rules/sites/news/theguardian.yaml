# The Guardian feed generation rules
site: theguardian.com
name: The Guardian
patterns:
  - pattern: "/{section}"
    example: "/technology"
  - pattern: "/world/{region}"
    example: "/world/europe"
  - pattern: "/environment/climate-crisis"
    example: "/environment/climate-crisis"
  - pattern: "/{year}/{month}/{day}/all"
    example: "/2024/01/15/all"

selectors:
  feed_title:
    css: 'h1.dcr-14n7yhj'
    attr: text
  feed_description:
    css: 'meta[name="description"]'
    attr: content
  items: 'div[data-link-name="article"]'
  item_title:
    css: 'h3'
    attr: text
  item_link:
    css: 'a[data-link-name="article"]'
    attr: href
  item_content:
    css: 'div.fc-item__standfirst'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span.fc-item__byline'
    attr: text
  item_image:
    css: 'img.responsive-img'
    attr: src
  item_categories:
    css: 'a.fc-item__kicker'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.theguardian.com'
  - action: clean_tracking
  - action: extract_full_text
    selector: 'div.article-body-commercial-selector'

javascript_required: false
rate_limit: 500