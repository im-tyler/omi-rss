# New York Times feed generation rules
site: nytimes.com
name: The New York Times
patterns:
  - pattern: "/"
    example: "/"
  - pattern: "/section/{section}"
    example: "/section/technology"
  - pattern: "/international"
    example: "/international"
  - pattern: "/trending"
    example: "/trending"

selectors:
  feed_title:
    css: 'h1.e1h9rw200'
    attr: text
  feed_description: 'The New York Times - Breaking News, US News, World News'
  items: 'article'
  item_title:
    css: 'h3'
    attr: text
  item_link:
    css: 'a'
    attr: href
    index: 0
  item_content:
    css: 'p.summary-class'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span.byline'
    attr: text
  item_image:
    css: 'img'
    attr: src
  item_categories:
    css: 'span.kicker'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.nytimes.com'
  - action: clean_tracking
  - action: remove_paywall_notice

javascript_required: true
rate_limit: 2000
custom_headers:
  Referer: 'https://www.google.com'