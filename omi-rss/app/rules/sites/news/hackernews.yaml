# Hacker News feed generation rules
site: news.ycombinator.com
name: Hacker News
patterns:
  - pattern: "/"
    example: "/"
  - pattern: "/best"
    example: "/best"
  - pattern: "/newest"
    example: "/newest"
  - pattern: "/show"
    example: "/show"
  - pattern: "/ask"
    example: "/ask"
  - pattern: "/jobs"
    example: "/jobs"

selectors:
  feed_title: 'Hacker News'
  feed_description: 'Links for the intellectually curious, ranked by readers'
  items: 'tr.athing'
  item_title:
    css: 'span.titleline > a'
    attr: text
  item_link:
    css: 'span.titleline > a'
    attr: href
  item_content:
    css: 'span.titleline'
    attr: html
  item_date:
    css: '+ tr span.age'
    attr: title
  item_author:
    css: '+ tr a.hnuser'
    attr: text
  item_categories:
    css: 'span.sitestr'
    attr: text

transforms:
  - action: add_comments_link
    selector: '+ tr a[href*="item?id="]'
  - action: absolute_urls
    base: 'https://news.ycombinator.com'
  - action: extract_points
    selector: '+ tr span.score'

javascript_required: false
rate_limit: 500