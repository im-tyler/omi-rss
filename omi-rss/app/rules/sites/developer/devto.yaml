# Dev.to feed generation rules
site: dev.to
name: Dev.to
patterns:
  - pattern: "/"
    example: "/"
  - pattern: "/t/{tag}"
    example: "/t/flutter"
  - pattern: "/{username}"
    example: "/ben"
  - pattern: "/top/{period}"
    example: "/top/week"
  - pattern: "/search?q={query}"
    example: "/search?q=react+hooks"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'p.profile-header__bio'
    attr: text
  items: 'article.crayons-story'
  item_title:
    css: 'h2.crayons-story__title a'
    attr: text
  item_link:
    css: 'h2.crayons-story__title a'
    attr: href
  item_content:
    css: 'div.crayons-story__body'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'a.crayons-story__secondary'
    attr: text
  item_image:
    css: 'img.crayons-article__cover__image'
    attr: src
  item_categories:
    css: 'a.crayons-tag'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://dev.to'
  - action: extract_reading_time
    selector: 'span.crayons-story__reading-time'
  - action: extract_reactions
    selector: 'span.aggregate_reactions_counter'

javascript_required: false
rate_limit: 500