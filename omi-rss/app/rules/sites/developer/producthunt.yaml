# Product Hunt feed generation rules
site: producthunt.com
name: Product Hunt
patterns:
  - pattern: "/"
    example: "/"
  - pattern: "/topics/{topic}"
    example: "/topics/developer-tools"
  - pattern: "/posts/{product}"
    example: "/posts/chatgpt"
  - pattern: "/collections/{collection}"
    example: "/collections/ai-tools"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description: 'Product Hunt - The best new products in tech'
  items: 'div[data-test="post-item"]'
  item_title:
    css: 'h3'
    attr: text
  item_link:
    css: 'a[data-test="post-name-link"]'
    attr: href
  item_content:
    css: 'p[data-test="tagline"]'
    attr: text
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'span[data-test="user-name"]'
    attr: text
  item_image:
    css: 'img[data-test="post-thumbnail"]'
    attr: src
  item_categories:
    css: 'a[data-test="topic-link"]'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://www.producthunt.com'
  - action: extract_vote_count
    selector: 'button[data-test="vote-button"] span'
  - action: add_comments_link

javascript_required: true
rate_limit: 1500