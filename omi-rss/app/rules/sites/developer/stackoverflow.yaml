# Stack Overflow feed generation rules
site: stackoverflow.com
name: Stack Overflow
patterns:
  - pattern: "/questions"
    example: "/questions"
  - pattern: "/questions/tagged/{tag}"
    example: "/questions/tagged/flutter"
  - pattern: "/users/{userid}/{username}"
    example: "/users/1/jeff-atwood"
  - pattern: "/search?q={query}"
    example: "/search?q=flutter+riverpod"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description: 'Stack Overflow - Where Developers Learn, Share, & Build Careers'
  items: 'div.s-post-summary'
  item_title:
    css: 'h3 a.s-link'
    attr: text
  item_link:
    css: 'h3 a.s-link'
    attr: href
  item_content:
    css: 'div.s-post-summary--content-excerpt'
    attr: text
  item_date:
    css: 'span.relativetime'
    attr: title
  item_author:
    css: 'a.s-user-card--link'
    attr: text
  item_categories:
    css: 'a.post-tag'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://stackoverflow.com'
  - action: extract_score
    selector: 'span.s-post-summary--stats-item-number'
  - action: add_answer_count
    selector: 'div.s-post-summary--stats-item:has(.iconAnswer)'

javascript_required: false
rate_limit: 1000