# GitHub feed generation rules
site: github.com
name: GitHub
patterns:
  - pattern: "/{owner}/{repo}"
    example: "/flutter/flutter"
  - pattern: "/{owner}/{repo}/releases"
    example: "/flutter/flutter/releases"
  - pattern: "/{owner}/{repo}/commits/{branch}"
    example: "/flutter/flutter/commits/main"
  - pattern: "/{owner}/{repo}/issues"
    example: "/flutter/flutter/issues"
  - pattern: "/{owner}/{repo}/pulls"
    example: "/flutter/flutter/pulls"
  - pattern: "/trending/{language}"
    example: "/trending/dart"

selectors:
  feed_title:
    css: 'h1 strong a'
    attr: text
  feed_description:
    css: 'p.f4'
    attr: text
  items: 'div.Box-row, div.commit, article.markdown-body'
  item_title:
    css: 'a.Link--primary, a.commit-message, h1.release-title'
    attr: text
  item_link:
    css: 'a.Link--primary, a.commit-message, h1.release-title a'
    attr: href
  item_content:
    css: 'div.markdown-body, pre.commit-message, div.comment-body'
    attr: html
  item_date:
    css: 'relative-time, time'
    attr: datetime
  item_author:
    css: 'a.commit-author, a.author, span.Label'
    attr: text
  item_categories:
    css: 'span.topic-tag'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://github.com'
  - action: expand_commit_message
  - action: extract_release_assets
    selector: 'details.dropdown'

javascript_required: false
rate_limit: 500