# Medium feed generation rules
site: medium.com
name: Medium
patterns:
  - pattern: "/@{username}"
    example: "/@ev"
  - pattern: "/tag/{tag}"
    example: "/tag/programming"
  - pattern: "/{publication}"
    example: "/towards-data-science"
  - pattern: "/search?q={query}"
    example: "/search?q=machine+learning"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description:
    css: 'p.u-fontSize18'
    attr: text
  items: 'article'
  item_title:
    css: 'h2, h3'
    attr: text
  item_link:
    css: 'a[data-action="open-post"]'
    attr: href
  item_content:
    css: 'p.graf--p'
    attr: text
    index: 0
  item_date:
    css: 'time'
    attr: datetime
  item_author:
    css: 'a[data-action="show-user-card"]'
    attr: text
  item_image:
    css: 'img.graf-image'
    attr: src
  item_categories:
    css: 'a.link--tag'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://medium.com'
  - action: clean_tracking
  - action: extract_claps
    selector: 'button[data-action="multivote"] span'
  - action: extract_reading_time
    selector: 'span.readingTime'

javascript_required: true
rate_limit: 2000