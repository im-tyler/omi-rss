domain: lobste.rs
name: Lobsters
category: communities
description: Technology-focused link aggregation site
requiresJS: false
example: https://lobste.rs

selectors:
  item: .story
  title: .link a
  url: .link a
  description: .tags
  author: .byline a.u-author
  date: .byline span[title]
  
transforms:
  - field: url
    type: absoluteUrl