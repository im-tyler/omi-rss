domain: ft.com
name: Financial Times
category: financial
description: Global financial news and analysis
requiresJS: true
example: https://www.ft.com

selectors:
  item: .o-teaser
  title: .o-teaser__heading
  url: .o-teaser__heading a
  description: .o-teaser__standfirst
  author: .o-teaser__meta-author
  date: time[datetime]
  image: .o-teaser__image img
  
transforms:
  - field: url
    type: absoluteUrl