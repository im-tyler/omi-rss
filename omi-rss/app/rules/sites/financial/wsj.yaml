domain: wsj.com
name: Wall Street Journal
category: financial
description: Business and financial news from WSJ
requiresJS: false
example: https://www.wsj.com

selectors:
  item: article[class*="WSJTheme"]
  title: h3[class*="headline"]
  url: a[class*="headline"]
  description: p[class*="summary"]
  author: span[class*="byline"]
  date: time
  image: img[class*="media"]
  
transforms:
  - field: url
    type: absoluteUrl
  - field: author
    type: regex
    pattern: "By (.+)"
    replacement: "$1"