domain: bloomberg.com
name: Bloomberg
category: financial
description: Financial news and market data from Bloomberg
requiresJS: true
example: https://www.bloomberg.com/markets

selectors:
  item: article[data-component="headline"]
  title: h3 a
  url: h3 a
  description: .summary
  author: .author
  date: time[datetime]
  image: img[data-component="image"]
  
transforms:
  - field: url
    type: absoluteUrl
  - field: date
    type: parseDate
    format: ISO8601
    
headers:
  User-Agent: Mozilla/5.0 (compatible; RSS reader)
  Accept: text/html,application/xhtml+xml