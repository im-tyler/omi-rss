domain: reuters.com
name: Reuters Business
category: financial
description: Business and financial news from Reuters
requiresJS: false
example: https://www.reuters.com/business/

selectors:
  item: article[class*="story-card"]
  title: h3 a
  url: h3 a
  description: p[data-testid="Dek"]
  author: span[data-testid="Author"]
  date: time[datetime]
  image: img[data-testid="Image"]
  
transforms:
  - field: url
    type: absoluteUrl
    baseUrl: https://www.reuters.com