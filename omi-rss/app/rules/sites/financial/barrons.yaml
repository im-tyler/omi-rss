domain: barrons.com
name: Barron's
category: financial
description: Financial investment news and analysis
requiresJS: false
example: https://www.barrons.com

selectors:
  item: article[class*="BarronsTheme"]
  title: h3[class*="headline"]
  url: a[class*="headline-link"]
  description: p[class*="summary"]
  author: span[class*="byline"]
  date: time
  image: img[class*="image"]