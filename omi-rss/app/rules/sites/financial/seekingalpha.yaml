domain: seekingalpha.com
name: Seeking Alpha
category: financial
description: Stock market analysis and research
requiresJS: true
example: https://seekingalpha.com/market-news

selectors:
  item: article[data-test-id="article-card"]
  title: h3[data-test-id="card-title"]
  url: a[data-test-id="card-title-link"]
  description: div[data-test-id="card-summary"]
  author: span[data-test-id="card-author"]
  date: time