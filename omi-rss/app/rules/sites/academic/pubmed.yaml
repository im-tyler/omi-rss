# PubMed feed generation rules
site: pubmed.ncbi.nlm.nih.gov
name: PubMed
patterns:
  - pattern: "/?term={query}"
    example: "/?term=covid+vaccine"
  - pattern: "/?term={query}&filter={filter}"
    example: "/?term=cancer&filter=pubt.clinicaltrial"
  - pattern: "/trending"
    example: "/trending"

selectors:
  feed_title: 'PubMed Search Results'
  feed_description:
    css: 'span.value'
    attr: text
  items: 'article.article-overview'
  item_title:
    css: 'a.docsum-title'
    attr: text
  item_link:
    css: 'a.docsum-title'
    attr: href
  item_content:
    css: 'div.docsum-snippet'
    attr: text
  item_date:
    css: 'span.docsum-journal-citation-part'
    attr: text
    regex: '(\d{4} \w+)'
  item_author:
    css: 'span.docsum-authors'
    attr: text
  item_categories:
    css: 'span.publication-type'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://pubmed.ncbi.nlm.nih.gov'
  - action: extract_pmid
    regex: '/(\d+)/'
  - action: add_full_text_links

javascript_required: false
rate_limit: 1000