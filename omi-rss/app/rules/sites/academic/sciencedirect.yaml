domain: sciencedirect.com
name: ScienceDirect
category: academic
description: Scientific research papers and articles
requiresJS: true
example: https://www.sciencedirect.com

selectors:
  item: .result-item
  title: .result-item-title
  url: .result-item-title a
  description: .result-item-description
  author: .result-item-authors
  date: .result-item-date
  
transforms:
  - field: url
    type: absoluteUrl
    baseUrl: https://www.sciencedirect.com