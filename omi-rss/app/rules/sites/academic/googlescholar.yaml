# Google Scholar feed generation rules
site: scholar.google.com
name: Google Scholar
patterns:
  - pattern: "/citations?user={userId}"
    example: "/citations?user=xgbTliYAAAAJ"
  - pattern: "/scholar?q={query}"
    example: "/scholar?q=machine+learning"
  - pattern: "/scholar_alerts?view_op=list_alerts"
    example: "/scholar_alerts?view_op=list_alerts"

selectors:
  feed_title:
    css: 'div#gsc_prf_in'
    attr: text
  feed_description:
    css: 'div.gsc_prf_il'
    attr: text
  items: 'div.gs_r, tr.gsc_a_tr'
  item_title:
    css: 'h3.gs_rt a, a.gsc_a_at'
    attr: text
  item_link:
    css: 'h3.gs_rt a, a.gsc_a_at'
    attr: href
  item_content:
    css: 'div.gs_rs'
    attr: text
  item_date:
    css: 'span.gsc_a_y'
    attr: text
  item_author:
    css: 'div.gs_a, div.gs_gray'
    attr: text
  item_categories:
    css: 'span.gs_ct1'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://scholar.google.com'
  - action: extract_citation_count
    selector: 'a[href*="cites="]'
  - action: clean_author_affiliations

javascript_required: false
rate_limit: 3000
custom_headers:
  Cookie: 'GSP=CF=4'