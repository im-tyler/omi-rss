# arXiv feed generation rules
site: arxiv.org
name: arXiv
patterns:
  - pattern: "/list/{category}/recent"
    example: "/list/cs.AI/recent"
  - pattern: "/search/?query={query}"
    example: "/search/?query=quantum+computing"
  - pattern: "/list/{category}/{year}"
    example: "/list/physics/2024"

selectors:
  feed_title:
    css: 'h1'
    attr: text
  feed_description: 'arXiv.org e-Print archive'
  items: 'dl dt, div.arxiv-result'
  item_title:
    css: 'div.list-title, p.title'
    attr: text
  item_link:
    css: 'a[href*="/abs/"]'
    attr: href
  item_content:
    css: 'p.abstract, span.abstract-full'
    attr: text
  item_date:
    css: 'div.list-dateline'
    attr: text
    regex: 'submitted (\d+ \w+ \d+)'
  item_author:
    css: 'div.list-authors, p.authors'
    attr: text
  item_categories:
    css: 'span.primary-subject'
    attr: text

transforms:
  - action: absolute_urls
    base: 'https://arxiv.org'
  - action: extract_pdf_link
    selector: 'a[href*="/pdf/"]'
  - action: clean_author_list

javascript_required: false
rate_limit: 1000