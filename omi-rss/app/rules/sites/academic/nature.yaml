domain: nature.com
name: Nature
category: academic
description: International journal of science
requiresJS: false
example: https://www.nature.com/nature/articles

selectors:
  item: article[itemtype*="ScholarlyArticle"]
  title: h3[itemprop="name"]
  url: a[itemprop="url"]
  description: p[itemprop="description"]
  author: span[itemprop="author"]
  date: time[itemprop="datePublished"]
  
transforms:
  - field: url
    type: absoluteUrl
    baseUrl: https://www.nature.com