site: twitter.com
name: Twitter/X
patterns:
  - pattern: /{username}
    example: /elonmusk
  - pattern: /search?q={query}
    example: /search?q=flutter
  - pattern: /{username}/lists/{list}
    example: /jack/lists/tech
selectors:
  feed_title:
    css: h2[role="heading"] span
    attribute: text
  feed_description:
    css: div[data-testid="UserDescription"]
    attribute: text
  items:
    css: article[role="article"][data-testid="tweet"]
  item_title:
    css: div[data-testid="tweetText"]
    attribute: text
  item_link:
    css: a[href*="/status/"]
    attribute: href
  item_content:
    css: div[data-testid="tweetText"]
    attribute: html
  item_date:
    css: time
    attribute: datetime
  item_author:
    css: div[data-testid="User-Name"] span
    attribute: text
  item_image:
    css: img[alt="Image"]
    attribute: src
transforms:
  - action: remove
    selector: .promotional, [aria-label="Promoted"]
  - action: absolute_urls
    base: https://twitter.com
  - action: clean_tracking
    params: true
  - action: limit
    count: 20
javascript_required: true
rate_limit: 2000
user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36