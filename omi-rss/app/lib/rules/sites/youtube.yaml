site: youtube.com
name: YouTube
patterns:
  - pattern: /channel/{channelId}
    example: /channel/UCwXdFgeE9KYzlDdR7TG9cMw
  - pattern: /c/{channelName}
    example: /c/Flutter
  - pattern: /@{handle}
    example: /@GoogleDevelopers
  - pattern: /playlist?list={playlistId}
    example: /playlist?list=PLjxrf2q8roU3ahJVrSgAnPjzkpGmL9Czl
selectors:
  feed_title:
    css: "#channel-title, .ytd-channel-name, h1.title"
    attribute: text
  feed_description:
    css: "#channel-header-description, yt-formatted-string#description"
    attribute: text
  items:
    css: ytd-grid-video-renderer, ytd-rich-item-renderer
  item_title:
    css: "#video-title, h3 a#video-title"
    attribute: text
  item_link:
    css: a#video-title, a#thumbnail
    attribute: href
  item_content:
    css: "#description-text, yt-formatted-string#description"
    attribute: text
  item_date:
    css: "#metadata-line span:nth-child(2)"
    attribute: text
  item_author:
    css: "#channel-name a, ytd-channel-name a"
    attribute: text
  item_image:
    css: img#img, yt-image img
    attribute: src
transforms:
  - action: absolute_urls
    base: https://www.youtube.com
  - action: clean_tracking
    params: true
  - action: remove
    selector: "#shorts-container"
  - action: limit
    count: 15
javascript_required: true
rate_limit: 3000
user_agent: Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)