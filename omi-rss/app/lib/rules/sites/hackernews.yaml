site: news.ycombinator.com
name: Hacker News
patterns:
  - pattern: /
    example: /
  - pattern: /best
    example: /best
  - pattern: /newest
    example: /newest
  - pattern: /ask
    example: /ask
  - pattern: /show
    example: /show
  - pattern: /jobs
    example: /jobs
selectors:
  feed_title:
    css: a#hnmain
    attribute: text
  feed_description:
    css: a#hnmain
    attribute: text
  items:
    css: tr.athing
  item_title:
    css: span.titleline > a
    attribute: text
  item_link:
    css: span.titleline > a
    attribute: href
  item_content:
    css: span.titleline
    attribute: html
  item_date:
    css: span.age
    attribute: title
  item_author:
    css: a.hnuser
    attribute: text
transforms:
  - action: absolute_urls
    base: https://news.ycombinator.com
  - action: limit
    count: 30
javascript_required: false
rate_limit: 1000