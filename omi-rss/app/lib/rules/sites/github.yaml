site: github.com
name: GitHub
patterns:
  - pattern: /{owner}/{repo}
    example: /flutter/flutter
  - pattern: /{owner}/{repo}/releases
    example: /flutter/flutter/releases
  - pattern: /{owner}/{repo}/commits
    example: /flutter/flutter/commits
  - pattern: /{owner}/{repo}/issues
    example: /flutter/flutter/issues
  - pattern: /{owner}/{repo}/discussions
    example: /flutter/flutter/discussions
selectors:
  feed_title:
    css: h1 strong a
    attribute: text
  feed_description:
    css: p.f4.color-fg-muted
    attribute: text
  items:
    css: .Box-row, .TimelineItem, .js-navigation-item
  item_title:
    css: a.Link--primary, h3.lh-condensed, .markdown-title
    attribute: text
  item_link:
    css: a.Link--primary, h3.lh-condensed a, .markdown-title a
    attribute: href
  item_content:
    css: .markdown-body, .comment-body, p.color-fg-muted
    attribute: html
  item_date:
    css: relative-time, time-ago
    attribute: datetime
  item_author:
    css: a.commit-author, .author, img.avatar + span
    attribute: text
transforms:
  - action: absolute_urls
    base: https://github.com
  - action: remove
    selector: .js-comment-edit-history
  - action: limit
    count: 30
javascript_required: false
rate_limit: 1000