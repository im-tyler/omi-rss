site: medium.com
name: Medium
patterns:
  - pattern: /@{username}
    example: /@ev
  - pattern: /{publication}
    example: /flutter-community
  - pattern: /tag/{tag}
    example: /tag/programming
selectors:
  feed_title:
    css: h1, div.u-flex1 h2
    attribute: text
  feed_description:
    css: p.be.b.bf.z, div[class*="subtitle"]
    attribute: text
  items:
    css: article, div[data-post-id]
  item_title:
    css: h2, h3.graf--title
    attribute: text
  item_link:
    css: a[data-action="open-post"], div > a[href*="/@"]
    attribute: href
  item_content:
    css: p.graf--p, div.section-content
    attribute: text
  item_date:
    css: time, span[data-testid="storyPublishDate"]
    attribute: text
  item_author:
    css: a[data-action="show-user-card"], a[rel="author"]
    attribute: text
  item_image:
    css: img.progressiveMedia-image
    attribute: src
transforms:
  - action: absolute_urls
    base: https://medium.com
  - action: remove
    selector: .js-postMetaLockup, .u-noUserSelect
  - action: clean_tracking
    params: true
  - action: limit
    count: 10
javascript_required: true
rate_limit: 2000