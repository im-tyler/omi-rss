name: CNN
url: cnn.com
description: CNN - Breaking News, Latest News and Videos
author: RSS Generator
categories:
  - news
  - politics
  - world

rules:
  - name: Homepage
    url_pattern: '^https?://www\.cnn\.com/?$'
    selector:
      container: div[data-type="card"]
      title: span.container__headline-text
      link: a.container__link[href]
      description: div.container__description
      date: div.container__date
      image: img.image__dam-img[src]
      
  - name: World
    url_pattern: '^https?://www\.cnn\.com/world/?$'
    selector:
      container: div.card
      title: span.card__headline-text
      link: a.card__link[href]
      description: div.card__description
      date: span.card__date
      image: picture img[src]
      
  - name: Politics
    url_pattern: '^https?://www\.cnn\.com/politics/?$'
    selector:
      container: article.card
      title: h3.card__headline span
      link: a.card__link[href]
      description: div.card__description
      date: div.card__date
      
  - name: Business
    url_pattern: '^https?://www\.cnn\.com/business/?$'
    selector:
      container: div.layout__wrapper article
      title: span.container__headline-text
      link: a.container__link[href]
      description: div.container__description
      date: span.container__date
      
  - name: Tech
    url_pattern: '^https?://www\.cnn\.com/business/tech/?$'
    selector:
      container: article.card
      title: h3 span
      link: a[href*="cnn.com"][href]
      description: div.card__description
      date: span.card__date

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.cnn.com
    
  - name: fix_protocol
    type: regex_replace
    field: link
    pattern: '^//'
    replacement: 'https://'
    
  - name: clean_date
    type: regex_extract
    field: date
    pattern: 'Updated\s+(.+?)(?:\s+ET)?$'
    default: use_current_time
    
  - name: extract_date
    type: parse_date
    field: date
    patterns:
      - 'h:mm a, EEE MMMM d, yyyy'
      - 'MMMM d, yyyy'
    fallback: now
    
  - name: enhance_images
    type: regex_replace
    field: image
    pattern: 'c_fill'
    replacement: 'c_fill,w_800'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1