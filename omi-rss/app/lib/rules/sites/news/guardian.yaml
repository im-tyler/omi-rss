name: The Guardian
url: theguardian.com
description: The Guardian - News, Opinion, Sport, Culture, and Lifestyle
author: RSS Generator
categories:
  - news
  - opinion
  - culture

rules:
  - name: Homepage
    url_pattern: '^https?://www\.theguardian\.com(/[a-z]{2})?/?$'
    selector:
      container: div.fc-item
      title: h3.fc-item__title a
      link: h3.fc-item__title a[href]
      description: div.fc-item__standfirst
      author: div.fc-item__byline
      date: time[datetime]
      image: img.fc-item__image[src]
      
  - name: World
    url_pattern: '^https?://www\.theguardian\.com/world/?$'
    selector:
      container: div.fc-item--has-image
      title: span.js-headline-text
      link: a.fc-item__link[href]
      description: div.fc-item__standfirst
      author: span.fc-item__byline
      date: time.fc-item__timestamp[datetime]
      
  - name: Opinion
    url_pattern: '^https?://www\.theguardian\.com/commentisfree/?$'
    selector:
      container: div.fc-item--type-comment
      title: h3 a span
      link: a.fc-item__link[href]
      description: div.fc-item__standfirst
      author: span.fc-item__byline
      date: time[datetime]
      
  - name: Technology
    url_pattern: '^https?://www\.theguardian\.com/technology/?$'
    selector:
      container: article.fc-item
      title: h3.fc-item__title
      link: a.u-faux-block-link__overlay[href]
      description: div.fc-item__standfirst
      date: time[datetime]
      image: picture img[src]
      
  - name: Environment
    url_pattern: '^https?://www\.theguardian\.com/environment/?$'
    selector:
      container: div.fc-item__container
      title: span.js-headline-text
      link: a.fc-item__link[href]
      description: div.fc-item__standfirst
      author: div.fc-item__byline
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.theguardian.com
    
  - name: clean_author
    type: strip_html
    field: author
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: enhance_images
    type: regex_replace
    field: image
    pattern: '/\d+\.jpg'
    replacement: '/1000.jpg'
    
  - name: remove_live_label
    type: regex_replace
    field: title
    pattern: '^\s*Live\s*'
    replacement: ''
    flags: i

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1