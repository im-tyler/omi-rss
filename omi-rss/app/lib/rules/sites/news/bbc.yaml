name: BBC News
url: bbc.com
description: BBC News - Breaking News, World News, and Video
author: RSS Generator
categories:
  - news
  - world
  - uk

rules:
  - name: Homepage
    url_pattern: '^https?://www\.bbc\.com/news/?$'
    selector:
      container: div[data-testid="card-text-wrapper"]
      title: h2[data-testid="card-headline"]
      link: a[data-testid="internal-link"][href]
      description: p[data-testid="card-description"]
      date: time[datetime]
      image: img[data-testid="card-media-image"][src]
      
  - name: World
    url_pattern: '^https?://www\.bbc\.com/news/world/?$'
    selector:
      container: div[data-testid="manchester-card"]
      title: h2
      link: a[href*="/news/"][href]
      description: p[data-testid="card-description"]
      date: time[datetime]
      
  - name: UK
    url_pattern: '^https?://www\.bbc\.com/news/uk/?$'
    selector:
      container: div.gs-c-promo
      title: h3.gs-c-promo-heading__title
      link: a.gs-c-promo-heading[href]
      description: p.gs-c-promo-summary
      date: time[datetime]
      image: img.gs-o-responsive-image[src]
      
  - name: Business
    url_pattern: '^https?://www\.bbc\.com/news/business/?$'
    selector:
      container: article[data-testid="card"]
      title: h2
      link: a[href^="/news/"][href]
      description: p
      date: time[datetime]
      
  - name: Technology
    url_pattern: '^https?://www\.bbc\.com/news/technology/?$'
    selector:
      container: div[data-testid="card-wrapper"]
      title: h2
      link: a[href*="/news/technology"][href]
      description: p
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.bbc.com
    
  - name: clean_title
    type: strip_html
    field: title
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    fallback: now
    
  - name: process_images
    type: regex_replace
    field: image
    pattern: '/\d+\.jpg'
    replacement: '/976.jpg'
    
  - name: add_source
    type: prepend_text
    field: title
    text: '[BBC] '

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml
  Accept-Language: en-GB,en;q=0.9

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1