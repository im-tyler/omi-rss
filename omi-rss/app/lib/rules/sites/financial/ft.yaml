name: Financial Times
url: ft.com
description: Financial Times - Global Business and Financial News
author: RSS Generator
categories:
  - finance
  - business
  - global
  - economy

rules:
  - name: Homepage
    url_pattern: '^https?://www\.ft\.com/?$'
    selector:
      container: div[data-trackable="story"] article
      title: a[data-trackable="heading-link"]
      link: a[data-trackable="heading-link"][href]
      description: p[data-trackable="standfirst"]
      author: a[data-trackable="author-link"]
      date: time[datetime]
      image: img[data-trackable="image"][src]
    
  - name: Markets
    url_pattern: '^https?://www\.ft\.com/markets/?$'
    selector:
      container: article.o-teaser
      title: div.o-teaser__heading a
      link: div.o-teaser__heading a[href]
      description: p.o-teaser__standfirst
      author: a.o-teaser__author
      date: time.o-teaser__timestamp[datetime]
      
  - name: Companies
    url_pattern: '^https?://www\.ft\.com/companies/?$'
    selector:
      container: div.stream-item article
      title: h3 a
      link: h3 a[href]
      description: p.standfirst
      date: time[datetime]
      
  - name: Tech
    url_pattern: '^https?://www\.ft\.com/technology/?$'
    selector:
      container: article[data-trackable="teaser"]
      title: a.js-teaser-heading-link
      link: a.js-teaser-heading-link[href]
      description: p.js-teaser-standfirst-link
      author: a[data-trackable="author"]
      date: time[datetime]
      
  - name: Opinion
    url_pattern: '^https?://www\.ft\.com/opinion/?$'
    selector:
      container: article.o-teaser--opinion
      title: div.o-teaser__heading a
      link: div.o-teaser__heading a[href]
      description: p.o-teaser__standfirst
      author: div.o-teaser__author a
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.ft.com
    
  - name: clean_titles
    type: strip_html
    field: title
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: add_subscription_notice
    type: append_text
    field: description
    text: ' [FT Subscription Required]'
    
  - name: process_image_urls
    type: regex_replace
    field: image
    pattern: '\?.*$'
    replacement: '?quality=highest&width=700'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml
  Accept-Language: en-US,en;q=0.9
  Referer: https://news.google.com/

cookies:
  - name: FT-Flags
    value: -:watchlistEnabled:on

rate_limit:
  requests_per_minute: 20
  delay_seconds: 3