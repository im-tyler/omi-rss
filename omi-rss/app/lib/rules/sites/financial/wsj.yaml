name: Wall Street Journal
url: wsj.com
description: Wall Street Journal - Business, Finance, and Market News
author: RSS Generator
categories:
  - finance
  - business
  - markets
  - economy

rules:
  - name: Homepage
    url_pattern: '^https?://www\.wsj\.com/?$'
    selector:
      container: article[data-type="article"]
      title: h3 a span
      link: h3 a[href]
      description: p.WSJTheme--summary
      author: p.WSJTheme--byline span
      date: p.WSJTheme--timestamp
      image: img.WSJTheme--image[src]
    
  - name: Markets
    url_pattern: '^https?://www\.wsj\.com/news/markets/?$'
    selector:
      container: article.WSJTheme--story
      title: h3.WSJTheme--headline a
      link: h3.WSJTheme--headline a[href]
      description: p.WSJTheme--summary
      author: p.WSJTheme--byline
      date: p.WSJTheme--timestamp
      
  - name: Tech
    url_pattern: '^https?://www\.wsj\.com/news/technology/?$'
    selector:
      container: article
      title: h3 a
      link: h3 a[href]
      description: p[class*="summary"]
      date: time[datetime]
      
  - name: Opinion
    url_pattern: '^https?://www\.wsj\.com/news/opinion/?$'
    selector:
      container: article[class*="opinion"]
      title: h3 a
      link: h3 a[href]
      description: p[class*="summary"]
      author: span[class*="author"]
      date: time[datetime]
      
  - name: Real Estate
    url_pattern: '^https?://www\.wsj\.com/news/realestate/?$'
    selector:
      container: article
      title: h3 a span
      link: h3 a[href]
      description: p[class*="summary"]
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.wsj.com
    
  - name: clean_titles
    type: regex_replace
    field: title
    pattern: '\s*-\s*WSJ$'
    replacement: ''
    
  - name: extract_date
    type: parse_date
    field: date
    patterns:
      - 'MMM. d, yyyy'
      - 'MMMM d, yyyy'
      - 'MMM. d, yyyy h:mm a ET'
    
  - name: add_subscription_notice
    type: append_text
    field: description
    text: ' [WSJ Subscription Required]'
    
  - name: extract_image
    type: regex_extract
    field: image
    pattern: 'im-\d+'
    transform: 'https://images.wsj.net/im-{0}?width=860'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml
  Accept-Language: en-US,en;q=0.9
  Referer: https://www.google.com/

rate_limit:
  requests_per_minute: 20
  delay_seconds: 3