name: Bloomberg
url: bloomberg.com
description: Bloomberg financial news and market data
author: RSS Generator
categories:
  - finance
  - business
  - markets

rules:
  - name: Markets News
    url_pattern: '^https?://www\.bloomberg\.com/markets/?$'
    selector:
      container: article[data-component="headline"]
      title: h3 a
      link: h3 a[href]
      description: div[data-component="summary"]
      author: span[data-component="byline"]
      date: time[datetime]
      image: picture img[src]
    
  - name: Technology
    url_pattern: '^https?://www\.bloomberg\.com/technology/?$'
    selector:
      container: article.story-list-story
      title: h3.story-list-story__headline a
      link: h3.story-list-story__headline a[href]
      description: p.story-list-story__summary
      author: span.story-list-story__byline
      date: time[datetime]
      
  - name: Opinion
    url_pattern: '^https?://www\.bloomberg\.com/opinion/?$'
    selector:
      container: article[data-type="article"]
      title: h3 a
      link: h3 a[href]
      description: p.summary
      author: span.author-name
      date: time[datetime]
      
  - name: Crypto
    url_pattern: '^https?://www\.bloomberg\.com/crypto/?$'
    selector:
      container: div.story-package-module__stories article
      title: h3 a
      link: h3 a[href]
      description: p.story-package-module__summary
      date: time[datetime]
      
  - name: Author Pages
    url_pattern: '^https?://www\.bloomberg\.com/authors/.*'
    selector:
      container: article.author-story-card
      title: h3 a
      link: h3 a[href]
      description: p.author-story-card__summary
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.bloomberg.com
    
  - name: clean_titles
    type: regex_replace
    field: title
    pattern: '\s*-\s*Bloomberg$'
    replacement: ''
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: add_paywall_notice
    type: append_text
    field: description
    text: ' [Subscription may be required]'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml
  Accept-Language: en-US,en;q=0.9

rate_limit:
  requests_per_minute: 30
  delay_seconds: 2