name: The Verge
url: theverge.com
description: The Verge - Technology, Science, Art, and Culture
author: RSS Generator
categories:
  - technology
  - science
  - culture

rules:
  - name: Homepage
    url_pattern: '^https?://www\.theverge\.com/?$'
    selector:
      container: div.c-compact-river__entry
      title: h2 a
      link: h2 a[href]
      description: p.c-entry-summary
      author: span.c-byline__author-name
      date: time[datetime]
      image: img.c-entry-box--compact__image[src]
      
  - name: Tech
    url_pattern: '^https?://www\.theverge\.com/tech/?$'
    selector:
      container: div.c-entry-box--compact
      title: h2 a
      link: h2 a[href]
      description: p.c-entry-summary
      author: div.c-byline a
      date: time[datetime]
      image: noscript img[src]
      
  - name: Science
    url_pattern: '^https?://www\.theverge\.com/science/?$'
    selector:
      container: div.c-compact-river article
      title: h2.c-entry-box--compact__title a
      link: h2.c-entry-box--compact__title a[href]
      description: p.c-entry-summary
      author: span.c-byline__item a
      date: time[datetime]
      
  - name: Reviews
    url_pattern: '^https?://www\.theverge\.com/reviews/?$'
    selector:
      container: div.c-entry-box
      title: h2 a
      link: h2 a[href]
      description: p.c-entry-summary
      author: span.c-byline__author-name
      date: time[datetime]
      image: picture img[src]
      
  - name: Features
    url_pattern: '^https?://www\.theverge\.com/features/?$'
    selector:
      container: article.c-entry-box
      title: h2 a
      link: h2 a[href]
      description: p.c-entry-summary
      author: div.c-byline
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://www.theverge.com
    
  - name: extract_image_from_noscript
    type: regex_extract
    field: image
    pattern: 'src="([^"]+)"'
    
  - name: clean_author
    type: strip_html
    field: author
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: enhance_images
    type: regex_replace
    field: image
    pattern: 'cdn\.vox-cdn\.com/thumbor/[^/]+/'
    replacement: 'cdn.vox-cdn.com/thumbor/800x0/'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1