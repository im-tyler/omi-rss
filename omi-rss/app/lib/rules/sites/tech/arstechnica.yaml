name: Ars Technica
url: arstechnica.com
description: Ars Technica - Technology, Science, and Culture
author: RSS Generator
categories:
  - technology
  - science
  - security

rules:
  - name: Homepage
    url_pattern: '^https?://arstechnica\.com/?$'
    selector:
      container: article.article
      title: h2 a
      link: h2 a[href]
      description: p.excerpt
      author: p.byline a
      date: time.date[datetime]
      image: figure.listing img[src]
      
  - name: Technology
    url_pattern: '^https?://arstechnica\.com/gadgets/?$'
    selector:
      container: li article.article
      title: h2 a
      link: h2 a[href]
      description: p.excerpt
      author: p.byline a
      date: time[datetime]
      image: div.listing__image img[src]
      
  - name: Science
    url_pattern: '^https?://arstechnica\.com/science/?$'
    selector:
      container: article.tease
      title: h2 a
      link: h2 a[href]
      description: p.excerpt
      author: p.byline a[rel="author"]
      date: time[datetime]
      
  - name: Security
    url_pattern: '^https?://arstechnica\.com/security/?$'
    selector:
      container: li article
      title: h2.heading a
      link: h2.heading a[href]
      description: p.excerpt
      author: p.byline a
      date: time.date[datetime]
      
  - name: Gaming
    url_pattern: '^https?://arstechnica\.com/gaming/?$'
    selector:
      container: article.article
      title: h2 a
      link: h2 a[href]
      description: p.excerpt
      author: span[itemprop="name"]
      date: time[datetime]
      image: figure img[src]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://arstechnica.com
    
  - name: clean_excerpt
    type: strip_html
    field: description
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: extract_author_name
    type: regex_extract
    field: author
    pattern: '^(.+?)(?:\s*-\s*\d+/\d+/\d+)?$'
    
  - name: enhance_image_quality
    type: regex_replace
    field: image
    pattern: '-\d+x\d+\.'
    replacement: '.'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1