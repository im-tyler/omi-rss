name: TechCrunch
url: techcrunch.com
description: TechCrunch - Startup and Technology News
author: RSS Generator
categories:
  - technology
  - startups
  - venture capital

rules:
  - name: Homepage
    url_pattern: '^https?://techcrunch\.com/?$'
    selector:
      container: article.post-block
      title: h2.post-block__title a
      link: h2.post-block__title a[href]
      description: div.post-block__content
      author: span.river-byline__authors a
      date: time[datetime]
      image: img.post-block__media-img[src]
    
  - name: Startups
    url_pattern: '^https?://techcrunch\.com/category/startups/?$'
    selector:
      container: div.river article
      title: h2 a
      link: h2 a[href]
      description: div.post-block__content
      author: div.river-byline a
      date: time[datetime]
      
  - name: AI
    url_pattern: '^https?://techcrunch\.com/category/artificial-intelligence/?$'
    selector:
      container: article.post-block
      title: h2 a
      link: h2 a[href]
      description: div.post-block__content
      author: span.river-byline__authors
      date: time[datetime]
      image: figure img[src]
      
  - name: Security
    url_pattern: '^https?://techcrunch\.com/category/security/?$'
    selector:
      container: li.river__item article
      title: h2 a
      link: h2 a[href]
      description: div.post-block__content
      author: div.river-byline
      date: time[datetime]
      
  - name: Author Pages
    url_pattern: '^https?://techcrunch\.com/author/.*'
    selector:
      container: li.river__item
      title: h2.post-block__title a
      link: h2.post-block__title a[href]
      description: div.post-block__content
      date: time[datetime]

transforms:
  - name: resolve_links
    type: resolve_relative_urls
    base_url: https://techcrunch.com
    
  - name: clean_description
    type: strip_html
    field: description
    preserve_tags: []
    
  - name: extract_date
    type: parse_date
    field: date
    format: ISO8601
    
  - name: extract_author
    type: regex_extract
    field: author
    pattern: '^\s*(.+?)\s*$'
    
  - name: process_images
    type: regex_replace
    field: image
    pattern: '\?.*$'
    replacement: '?w=680'

headers:
  User-Agent: Mozilla/5.0 (compatible; RSSGenerator/1.0)
  Accept: text/html,application/xhtml+xml

rate_limit:
  requests_per_minute: 60
  delay_seconds: 1